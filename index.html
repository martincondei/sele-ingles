<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Selectividad</title>
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body>

  <h1>English Selectividad</h1>

  <!-- ================= INICIO ================= -->

  <section id="startSelection">
    <button id="chooseSpecificExam">Elegir examen concreto</button>
    <button id="chooseRandomExam">Hacer examen aleatorio</button>
    <button id="choosePracticeReading">Practicar reading aleatorio</button>
    <button id="choosePracticeUse">Practicar use of english aleatorio</button>
  </section>

  <!-- ================= PRÁCTICA READING ================= -->

  <section id="practiceReadingSelection" style="display:none;">
    <h2>Practicar reading aleatorio</h2>
    <h3>Años</h3>
    <div id="practiceReadingYearList"></div>

    <br>
    <button id="startPracticeReading">Generar reading</button>
    <br>
    <button id="backFromPracticeReadingSelection">Atrás</button>
  </section>

  <!-- ================= PRÁCTICA USE OF ENGLISH ================= -->

  <section id="practiceUseSelection" style="display:none;">
    <h2>Practicar use of english aleatorio</h2>
    <h3>Años</h3>
    <div id="practiceUseYearList"></div>

    <br>
    <button id="startPracticeUse">Generar use of english</button>
    <br>
    <button id="backFromPracticeUseSelection">Atrás</button>
  </section>

  <!-- ================= EXAMEN ALEATORIO ================= -->

  <section id="randomSelection" style="display:none;">
    <h2>Examen aleatorio</h2>

    <h3>Años</h3>
    <div id="randomYearList"></div>

    <h3>Modelo</h3>
    <label>
      <input type="radio" name="randomModel" value="legacy_old">
      Modelo antiguo: elegir Reading y responder 6 de 12 en Use of English
    </label>
    <br>
    <label>
      <input type="radio" name="randomModel" value="legacy_new" checked>
      Modelo nuevo: Reading asignado y elegir 1 bloque de Use of English
    </label>

    <br><br>
    <button id="startRandomExam">Generar examen</button>
    <br>
    <button id="backFromRandomSelection">Atrás</button>
  </section>

  <!-- ================= SELECCIÓN DE AÑO ================= -->

  <section id="yearSelection" style="display:none;">
    <h2>Selecciona un año</h2>
    <div id="yearList"></div>
    <br>
    <button id="backFromYear">Atrás</button>
  </section>

  <!-- ================= SELECCIÓN DE EXAMEN ================= -->

  <section id="examSelection" style="display:none;">
    <h2>Selecciona un examen</h2>
    <div id="examList"></div>
    <br>
    <button id="backFromExamSelection">Atrás</button>
  </section>

  <!-- ================= MODELO PARA EXÁMENES ANTIGUOS ================= -->

  <section id="legacyModelSelection" style="display:none;">
    <h2>Modelo de examen</h2>

    <button id="chooseLegacyOld">
      Modelo antiguo: elegir Reading y responder 6 de 12 en Use of English
    </button>

    <button id="chooseLegacyNew">
      Modelo nuevo: Reading asignado y elegir 1 bloque de Use of English
    </button>

    <br>
    <button id="backFromLegacyModel">Atrás</button>
  </section>

  <!-- ================= EXAMEN ================= -->

  <section id="exam" style="display:none;">
    <h2 id="examTitle"></h2>

    <div id="readingSection">
      <!-- ===== ELECCIÓN DE READING (solo si hay varios y modo elección) ===== -->
      <div id="readingChoice" style="display:none; margin-bottom: 20px;">
        <label>
          Reading que entrego:
          <select id="chosenReading"></select>
        </label>
      </div>

      <!-- ================= READING ================= -->
      <h3>Reading</h3>
      <div id="readingContainer"></div>
    </div>

    <hr id="examSeparator">

    <div id="useSection">
      <!-- ================= USE OF ENGLISH ================= -->

      <h3>Use of English</h3>

      <div id="useBlockChoice" style="margin-bottom: 20px;">
        <label>
          Bloque de Use of English que entrego:
          <select id="chosenUseBlock"></select>
        </label>
      </div>

      <div id="useQuestions"></div>
    </div>

    <br>
    <button id="submitExam">Enviar examen</button>
    <button id="skipRandomExam" style="display:none;">Saltar a siguiente examen</button>
    <button id="skipPracticeReading" style="display:none;">Saltar al siguiente reading</button>
    <button id="skipPracticeUse" style="display:none;">Saltar al siguiente use of english</button>

    <!-- ================= RESULTADOS FINALES ================= -->
    <div id="finalScore" style="margin-top: 30px;"></div>

    <br>
    <button id="backFromExam">Atrás</button>
  </section>

  <script type="module" src="./js/main.js"></script>

</body>

</html>
